<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Görev Oluştur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f2f2f2;
    }

    h2 {
      color: #333;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    button {
      background-color: #28a745;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #218838;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Yeni Görev Oluştur</h2>
  <form id="gorev-form">
    <input type="text" id="baslik" placeholder="Başlık" required /><br>
    <textarea id="aciklama" placeholder="Açıklama" required></textarea><br>
    <input type="text" id="gorevliler" placeholder="Görevliler (email, virgülle ayrılmış)" /><br>
    <input type="text" id="gorevDosya" placeholder="Dosya ID'leri (virgülle ayrılmış)" /><br>
    <input type="text" id="gorevResim" placeholder="Resim ID'leri (virgülle ayrılmış)" /><br>
    <button type="submit">Görev Oluştur</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("gorev-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const token = localStorage.getItem("token");
      if (!token) {
        document.getElementById("result").innerText = "Lütfen giriş yapınız.";
        return;
      }

      const baslik = document.getElementById("baslik").value;
      const aciklama = document.getElementById("aciklama").value;

      const gorevlilerRaw = document.getElementById("gorevliler").value.trim();
      const gorevliler = gorevlilerRaw ? gorevlilerRaw.split(",").map(s => s.trim()) : [];

      const gorevDosyaRaw = document.getElementById("gorevDosya").value.trim();
      const gorevDosya = gorevDosyaRaw ? gorevDosyaRaw.split(",").map(id => parseInt(id.trim())) : [];

      const gorevResimRaw = document.getElementById("gorevResim").value.trim();
      const gorevResim = gorevResimRaw ? gorevResimRaw.split(",").map(id => parseInt(id.trim())) : [];

      const mutation = `
        mutation CreateGorev($input: GorevInput!) {
          createGorev(input: $input) {
            id
            baslik
            aciklama
          }
        }
      `;

      const variables = {
        input: {
          baslik,
          aciklama,
          gorevliler,
          gorevDosya,
          gorevResim
        }
      };

      try {
        const response = await fetch("/graphql/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Token ${token}`
          },
          body: JSON.stringify({ query: mutation, variables })
        });

        const result = await response.json();

        if (result.errors) {
          document.getElementById("result").innerText = "Hata: " + result.errors[0].message;
        } else {
          const gorev = result.data.createGorev;
          document.getElementById("result").innerText = `Görev başarıyla oluşturuldu: ${gorev.baslik}`;
          document.getElementById("gorev-form").reset();
        }
      } catch (err) {
        document.getElementById("result").innerText = "İstek sırasında hata oluştu.";
        console.error(err);
      }
    });
  </script>
</body>
</html>
