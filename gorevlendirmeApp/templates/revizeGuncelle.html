<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Revize Güncelleme</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f4;
    }
    h2 {
      color: #333;
    }
    .form-karti {
      background: white;
      border-radius: 8px;
      padding: 20px;
      max-width: 500px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .form-karti label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    .form-karti input, .form-karti textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .form-karti button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 16px;
      margin-top: 15px;
      border-radius: 6px;
      cursor: pointer;
    }
    .form-karti button:hover {
      background-color: #218838;
    }
    #sonuc {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Revize Güncelle</h2>
  <div class="form-karti">
    <label for="oncekiRevizeId">Önceki Revize ID:</label>
    <input type="number" id="oncekiRevizeId" required />

    <label for="baslik">Başlık:</label>
    <input type="text" id="baslik" required />

    <label for="aciklama">Açıklama:</label>
    <textarea id="aciklama" rows="4" required></textarea>

    <label for="emailListesi">Kullanıcı E-Postaları (virgülle ayırın):</label>
    <input type="text" id="emailListesi" placeholder="ornek1@mail.com, ornek2@mail.com" required />

    <button onclick="revizeGuncelle()">Revize Güncelle</button>
    <div id="sonuc"></div>
  </div>

  <script>
    async function revizeGuncelle() {
      const token = localStorage.getItem("token");
      if (!token) {
        document.getElementById("sonuc").innerText = "Lütfen giriş yapınız.";
        return;
      }

      const oncekiRevizeId = parseInt(document.getElementById("oncekiRevizeId").value);
      const baslik = document.getElementById("baslik").value;
      const aciklama = document.getElementById("aciklama").value;
      const emailListesiRaw = document.getElementById("emailListesi").value;
      const kullaniciEmailListesi = emailListesiRaw.split(",").map(email => email.trim()).filter(email => email);

      const query = `
        mutation RevizeGuncelle {
          revizeGuncelleme(
            oncekiRevizeId: ${oncekiRevizeId},
            baslik: "${baslik}",
            aciklama: "${aciklama}",
            kullaniciEmailListesi: [${kullaniciEmailListesi.map(e => `"${e}"`).join(", ")}]
          ) {
            id
            baslik
            aciklama
          }
        }
      `;

      const response = await fetch("/graphql/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Token " + token
        },
        body: JSON.stringify({ query })
      });

      const result = await response.json();
      const sonucDiv = document.getElementById("sonuc");

      if (result.errors) {
        sonucDiv.style.color = "red";
        sonucDiv.innerText = `Hata: ${result.errors[0].message}`;
      } else {
        sonucDiv.style.color = "green";
        const yeniRevize = result.data.revizeGuncelleme;
        sonucDiv.innerText = `✅ Revize güncellendi: ${yeniRevize.baslik} (ID: ${yeniRevize.id})`;
      }
    }
  </script>
</body>
</html>
